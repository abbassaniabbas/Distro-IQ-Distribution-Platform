<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; worker-src 'self' blob:">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>DistroIQ Sales, Stock & Distribution</title>
    <link rel="icon" href="./src/assets/distro-iq-mark.svg">
    <link rel="stylesheet" href="./src/css/app.css?v=20260722e">
    <script type="module" src="./src/js/app.js?v=20260722j"></script>
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="Main navigation">
        <a class="brand" href="#/dashboard" aria-label="DistroIQ dashboard">
          <img src="./src/assets/distro-iq-mark.svg" alt="" width="36" height="36">
          <span>
            <strong>DistroIQ</strong>
            <small>Sales, Stock & Distribution</small>
          </span>
        </a>

        <nav class="nav-list" id="primary-nav"></nav>

        <div class="sidebar-footer">
          <div>
            <span class="eyebrow">Current role</span>
            <strong id="sidebar-role-label">Team member</strong>
            <small id="sidebar-role-context">Signed in</small>
          </div>
        </div>
      </aside>

      <div class="main-shell">
        <header class="topbar">
          <div class="topbar-heading">
            <span class="eyebrow">Command center</span>
            <div class="topbar-title-row">
              <h1 id="view-title">Dashboard</h1>
              <div class="dashboard-status-summary" aria-live="polite">
                <span class="eyebrow">Today</span>
                <strong id="dashboard-dispatch-count">0 dispatches</strong>
              </div>
            </div>
          </div>

          <div class="topbar-actions">
            <label class="search-field" for="global-search">
              <span class="sr-only">Search operations</span>
              <input id="global-search" type="search" placeholder="Search sales, reps, customers, snacks">
            </label>
            <div class="topbar-utility-actions" id="topbar-utility-actions" hidden>
              <button class="topbar-icon-button has-alert" id="topbar-notifications" type="button" title="Notifications" aria-label="Notifications">
                <span data-icon="bell"></span>
              </button>
              <a class="topbar-icon-button" href="#/activity-log" title="Recent activity" aria-label="Recent activity">
                <span data-icon="history"></span>
              </a>
              <button class="topbar-icon-button" id="topbar-messages" type="button" title="Messages" aria-label="Messages">
                <span data-icon="message"></span>
              </button>
              <a class="profile-button" href="#/settings" title="Profile and settings" aria-label="Profile and settings">
                <span class="profile-avatar" id="topbar-avatar">DI</span>
              </a>
            </div>
            <button class="icon-button" id="sign-out" type="button" title="Sign out" aria-label="Sign out" hidden>
              <span data-icon="logOut"></span>
            </button>
          </div>
        </header>

        <main id="view-root" class="view-root" tabindex="-1"></main>
      </div>
    </div>

    <div class="toast-region" id="toast-region" aria-live="polite" aria-atomic="true"></div>
  </body>
</html>
